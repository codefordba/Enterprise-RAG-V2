version: '3.8'

services:
  app:
    image: enterprise-rag-app-v2:latest  # Replace with your Docker Hub username/tag
    container_name: enterprise-rag-app
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    volumes:
      # Mount a single local folder to persist all configurations, keys, and evaluation logs
      - ./app_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped