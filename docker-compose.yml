services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - /home/llm-infra-lab/qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__ANALYTICS_ENABLED=false
    restart: unless-stopped
    networks:
      - llm-infra-net

  embedding-server:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: rag-embedding-server
    ports:
      - "8090:8080"
    volumes:
      - /home/llm-infra-lab/tei_models:/data
    environment:
      - OMP_NUM_THREADS=8
      - MKL_NUM_THREADS=8
      - HF_HUB_ENABLE_HF_TRANSFER=1
    command: --model-id BAAI/bge-large-en-v1.5 --port 8080
    restart: unless-stopped
    networks:
      - llm-infra-net

  reranker-server:
    image: ghcr.io/huggingface/text-embeddings-inference:latest
    container_name: rag-reranker-server
    ports:
      - "8081:80"
    volumes:
      - /home/llm-infra-lab/tei_models:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: --model-id BAAI/bge-reranker-large --port 80
    restart: unless-stopped
    networks:
      - llm-infra-net

networks:
  llm-infra-net:
    driver: bridge